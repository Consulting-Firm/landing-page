name: Deploy to Vercel

# Vercel's own Git integration only auto-builds commits whose author is on the
# Vercel team. This workflow runs on EVERY push to main — regardless of who
# committed — and triggers a Vercel Deploy Hook so production always ships.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy manually from the Actions tab

# Never run two production deploys at once; the latest push wins.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Missing VERCEL_DEPLOY_HOOK_URL secret. Create a Deploy Hook in Vercel (Settings → Git → Deploy Hooks, branch: main) and add it as a repo Actions secret."
            exit 1
          fi
          curl -fsSL -X POST "$HOOK"
          echo "Triggered Vercel deploy for ${GITHUB_SHA}."
